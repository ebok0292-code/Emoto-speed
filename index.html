<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>E-Moto AVAS System V3</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --surface-color: #1f2833;
      --accent-cyan: #66fcf1;
      --accent-teal: #45a29e;
      --text-main: #c5c6c7;
      --text-muted: #7a7a7a;
      --warning: #ffaa00;
      --danger: #ff4400;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh; 
      overflow: hidden;
      user-select: none;
    }

    header {
      width: 100%;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 20;
    }

    .app-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .telemetry-bar {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      padding: 6px 20px;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      font-size: 9px;
      font-family: monospace;
      letter-spacing: 1px;
      color: var(--accent-teal);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 6px; height: 6px;
      background-color: var(--danger);
      border-radius: 50%;
      transition: all 0.3s;
    }

    .status-dot.active {
      background-color: var(--accent-cyan);
      box-shadow: 0 0 8px var(--accent-cyan);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .speed-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -30px;
    }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(100px, 45vw, 180px);
      font-weight: 900;
      line-height: 0.8;
      color: var(--accent-cyan);
      text-shadow: 0 0 40px rgba(102, 252, 241, 0.3);
    }

    #unit {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 8px;
      color: var(--accent-teal);
      margin-top: 15px;
    }

    #status-text {
      position: absolute;
      bottom: 20px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .controls-bar {
      width: 100%;
      padding: 15px 20px 30px 20px; 
      display: flex;
      gap: 12px;
      background: var(--surface-color);
      z-index: 20;
    }

    button {
      flex: 1;
      padding: 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-main);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    button.active-toggle {
      background: rgba(102, 252, 241, 0.1);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11, 12, 16, 0.98);
      backdrop-filter: blur(15px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .sound-opt {
      width: 100%;
      max-width: 280px;
      padding: 20px;
      background: var(--surface-color);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text-muted);
    }

    .sound-opt.active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    #secret-trigger {
      position: absolute;
      top: 0; left: 0; width: 60px; height: 60px; z-index: 30;
    }

    #debug-panel {
      position: absolute;
      top: 100px; right: 15px;
      background: var(--surface-color);
      padding: 15px; border-radius: 12px;
      z-index: 50; width: 180px; display: none;
    }
  </style>
</head>
<body>

  <div id="secret-trigger"></div>

  <header>
    <div class="app-title">AVAS Core V3</div>
    <div class="status-indicator">
      <div class="status-dot" id="gps-dot"></div>
      <span id="gps-text">GPS</span>
    </div>
  </header>

  <div class="telemetry-bar">
    <span id="acc-val">ACCURACY: --</span>
    <span id="head-val">HEADING: --</span>
  </div>

  <main>
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="status-text">WAITING FOR SATELLITE LOCK...</div>
  </main>

  <div class="controls-bar">
    <button id="audio-btn">Audio Off</button>
    <button id="menu-btn">Profile</button>
  </div>

  <div id="debug-panel">
    <div style="font-size: 10px; margin-bottom: 10px;">SIMULATE GPS</div>
    <input type="checkbox" id="debug-check">
    <input type="range" id="manual-slider" min="0" max="80" value="0" style="width: 100%;">
  </div>

  <div id="modal">
    <div class="sound-opt active">1. TESLA (GHOST WHINE)</div>
    <div class="sound-opt" style="opacity: 0.2;">2. LOCKED</div>
    <button id="close-modal" style="margin-top: 20px; width: 280px;">Back</button>
  </div>

  <script>
    const speedEl = document.getElementById('speed');
    const statusText = document.getElementById('status-text');
    const gpsDot = document.getElementById('gps-dot');
    const accVal = document.getElementById('acc-val');
    const headVal = document.getElementById('head-val');
    const audioBtn = document.getElementById('audio-btn');
    const menuBtn = document.getElementById('menu-btn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('close-modal');
    const debugCheck = document.getElementById('debug-check');
    const manualSlider = document.getElementById('manual-slider');
    const secretTrigger = document.getElementById('secret-trigger');

    let audioCtx, osc1, osc2, oscIdle, gainMain, gainIdle;
    let audioEnabled = false;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Main layers (Speed based)
      osc1 = audioCtx.createOscillator();
      osc2 = audioCtx.createOscillator();
      gainMain = audioCtx.createGain();
      
      // Idle layer (Angelic Hum)
      oscIdle = audioCtx.createOscillator();
      gainIdle = audioCtx.createGain();

      osc1.type = 'sine'; 
      osc2.type = 'sine';
      oscIdle.type = 'triangle'; // Triangle is slightly "softer" but present

      gainMain.gain.setValueAtTime(0, audioCtx.currentTime);
      gainIdle.gain.setValueAtTime(0, audioCtx.currentTime);

      osc1.connect(gainMain); 
      osc2.connect(gainMain);
      oscIdle.connect(gainIdle);

      gainMain.connect(audioCtx.destination);
      gainIdle.connect(audioCtx.destination);

      osc1.start(); 
      osc2.start();
      oscIdle.start();
      
      // Fixed frequency for the angelic idle
      oscIdle.frequency.setValueAtTime(110, audioCtx.currentTime); 
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? "Audio On" : "Audio Off";
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      if (audioEnabled) {
        audioCtx.resume();
        // Trigger idle sound immediately if speed is 0
        updateSystem(parseFloat(speedEl.textContent) || 0);
      } else {
        gainMain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        gainIdle.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      }
    });

    function getHeading(deg) {
      if (deg === null) return "--";
      const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
      return directions[Math.round(deg / 45) % 8];
    }

    function updateSystem(mph, accuracy = null, heading = null) {
      speedEl.textContent = Math.max(0, Math.round(mph));
      if (accuracy) accVal.textContent = `ACCURACY: ${Math.round(accuracy)}m`;
      if (heading !== null) headVal.textContent = `HEADING: ${getHeading(heading)}`;

      if (audioEnabled && audioCtx) {
        // Speed Pitch
        osc1.frequency.setTargetAtTime(80 + (mph * 3), audioCtx.currentTime, 0.1);
        osc2.frequency.setTargetAtTime(250 + (mph * 20), audioCtx.currentTime, 0.1);
        
        // Speed Volume (fades in as you move)
        const mainVol = mph > 0.2 ? Math.min(0.4, 0.1 + (mph / 45)) : 0;
        gainMain.gain.setTargetAtTime(mainVol, audioCtx.currentTime, 0.1);

        // Idle Volume (Angelic hum fades OUT as you move faster)
        // Strongest at 0, gone by 10 mph
        const idleVol = mph < 10 ? 0.15 * (1 - (mph / 10)) : 0;
        gainIdle.gain.setTargetAtTime(idleVol, audioCtx.currentTime, 0.2);
      }
      
      if (mph < 20) speedEl.style.color = 'var(--accent-cyan)';
      else if (mph < 40) speedEl.style.color = 'var(--warning)';
      else speedEl.style.color = 'var(--danger)';
    }

    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (!debugCheck.checked) {
          gpsDot.classList.add('active');
          statusText.textContent = "SYSTEM LIVE";
          const s = pos.coords.speed;
          updateSystem(s > 0 ? s * 2.237 : 0, pos.coords.accuracy, pos.coords.heading);
        }
      }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    menuBtn.addEventListener('click', () => modal.style.display = 'flex');
    closeModal.addEventListener('click', () => modal.style.display = 'none');
    secretTrigger.addEventListener('click', () => {
      const p = document.getElementById('debug-panel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    });

    manualSlider.addEventListener('input', () => {
      if (debugCheck.checked) updateSystem(parseFloat(manualSlider.value), 1, 90);
    });

    startGPS();
  </script>
</body>
</html>
