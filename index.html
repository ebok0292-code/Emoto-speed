<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS Core">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#030405">
  <link rel="manifest" href="manifest.json">

  <title>E-Moto AVAS System V1.18</title>
  <style>
    :root {
      --bg-color: #030405;
      --accent-cyan: #00f2ff;
      --accent-green: #00ff88;
      --accent-orange: #ff9d00;
      --accent-violet: #bc13fe;
      --text-main: #e0e0e0;
      --text-muted: #33393f;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden; user-select: none;
      touch-action: none;
    }

    #canvas-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none; opacity: 0.7;
    }

    header {
      width: 100%; padding: 25px 24px 15px 24px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    
    .app-title { font-size: 10px; font-weight: 900; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }
    
    .status-indicator { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 800; color: var(--text-muted); }
    #gps-text.linked { color: var(--accent-green); letter-spacing: 1px; }
    
    .status-dot { width: 10px; height: 10px; background-color: #200; border-radius: 50%; transition: all 0.3s; }
    .status-dot.active { 
      background-color: var(--accent-green); 
      box-shadow: 0 0 15px var(--accent-green);
      animation: blink 1.2s infinite ease-in-out;
    }

    @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.8); } }

    .telemetry-bar {
      width: 100%; padding: 0 24px 15px 24px; display: flex; justify-content: space-between;
      font-size: 9px; font-family: monospace; letter-spacing: 2px; color: var(--text-muted);
      z-index: 20;
    }
    
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
    
    .speed-container { pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    #speed { 
      font-family: 'Courier New', monospace; font-size: clamp(150px, 45vh, 300px); font-weight: 900; 
      line-height: 0.75; color: var(--accent-cyan); 
      text-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
    }
    #unit { font-size: 14px; font-weight: 900; letter-spacing: 18px; color: var(--text-muted); margin-top: 10px; }
    
    #debug-label { 
      position: absolute; bottom: 40px; font-size: 10px; color: var(--accent-orange); 
      letter-spacing: 4px; font-weight: 900; opacity: 0; transition: opacity 0.3s;
      text-transform: uppercase;
    }
    #debug-label.visible { opacity: 1; }

    .controls-bar { width: 100%; padding: 20px 24px 60px 24px; display: flex; justify-content: center; z-index: 20; }
    button { 
      width: 100%; max-width: 320px; padding: 22px; 
      background: rgba(25, 27, 30, 0.7); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main); 
      font-size: 12px; font-weight: 900; letter-spacing: 5px; border-radius: 16px; 
      text-transform: uppercase; transition: all 0.3s;
    }
    button.active-toggle { border-color: var(--accent-green); color: var(--accent-green); background: rgba(0, 255, 136, 0.05); }
    
    #secret-trigger { position: absolute; top: 0; left: 0; width: 100px; height: 100px; z-index: 100; }

    @media (orientation: landscape) {
      main { flex-direction: row; }
      #speed { font-size: clamp(140px, 35vw, 320px); }
      .controls-bar { padding-bottom: 30px; }
    }
  </style>
</head>
<body>
  <div id="secret-trigger"></div>
  <div id="canvas-container"><canvas id="visualizer"></canvas></div>
  
  <header>
    <div class="app-title">AVAS Core V1.18</div>
    <div class="status-indicator">
        <div class="status-dot" id="gps-dot"></div>
        <span id="gps-text">GPS SEARCHING</span>
    </div>
  </header>
  
  <div class="telemetry-bar">
    <span id="acc-val">SIGNAL: --</span>
    <span id="sim-status">SIM: OFF</span>
  </div>
  
  <main id="interaction-zone">
    <div class="speed-container"><div id="speed">0</div><div id="unit">MPH</div></div>
    <div id="debug-label">LAB MODE ACTIVE</div>
  </main>
  
  <div class="controls-bar"><button id="audio-btn">Standby</button></div>

  <script>
    const speedEl = document.getElementById('speed');
    const gpsDot = document.getElementById('gps-dot');
    const gpsText = document.getElementById('gps-text');
    const accVal = document.getElementById('acc-val');
    const simStatus = document.getElementById('sim-status');
    const audioBtn = document.getElementById('audio-btn');
    const debugLabel = document.getElementById('debug-label');
    const interactionZone = document.getElementById('interaction-zone');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    let audioCtx, gainIdle, filter, analyser;
    let choir = []; 
    let vibratoLFO, vibratoGain;
    let audioEnabled = false;
    let isSimMode = false;
    let currentSpeed = 0;

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvasCtx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      gainIdle = audioCtx.createGain(); 
      gainIdle.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;

      vibratoLFO = audioCtx.createOscillator();
      vibratoGain = audioCtx.createGain();
      vibratoLFO.frequency.value = 1.8; 
      vibratoGain.gain.value = 3; 
      vibratoLFO.connect(vibratoGain);
      vibratoLFO.start();

      const ratios = [1.0, 1.49, 1.88, 2.1]; 
      choir = ratios.map((ratio) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 220 * ratio;
        g.gain.value = 0.12; 
        vibratoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(gainIdle);
        osc.start();
        return osc;
      });
      
      gainIdle.connect(filter);
      filter.connect(analyser);
      analyser.connect(audioCtx.destination);
      resizeCanvas();
      drawVisualizer();
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvasCtx.clearRect(0, 0, w, h);

      if (!audioEnabled || !analyser) return;

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);

      const speedFactor = Math.min(currentSpeed / 85, 1);
      const idlePulse = (Math.sin(Date.now() / 500) + 1) * 2; // Idle hum effect
      
      canvasCtx.lineWidth = 5 + (speedFactor * 15) + idlePulse;
      canvasCtx.lineJoin = 'round';
      canvasCtx.strokeStyle = '#bc13fe'; 
      canvasCtx.shadowBlur = 25;
      canvasCtx.shadowColor = '#bc13fe';
      
      canvasCtx.beginPath();
      const sliceWidth = w / bufferLength;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        // Even at 0mph, the wave has a tiny sine offset
        const idleWave = Math.sin(i * 0.1 + (Date.now() / 200)) * 5;
        const y = (v * h / 2) + (Math.sin(i * 0.05) * speedFactor * 50) + (speedFactor === 0 ? idleWave : 0);
        
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.stroke();
      canvasCtx.shadowBlur = 0;
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? "Active" : "Standby";
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      if (audioEnabled) {
        audioCtx.resume();
        updateSystem(currentSpeed);
      } else {
        gainIdle.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
      }
    });

    function updateSystem(mph, accuracy = null) {
      currentSpeed = mph;
      const now = audioCtx ? audioCtx.currentTime : 0;
      speedEl.textContent = Math.max(0, Math.round(mph));
      
      if (accuracy !== null) {
        accVal.textContent = `SIGNAL: ±${Math.round(accuracy)}M`;
        accVal.style.color = accuracy < 10 ? 'var(--accent-green)' : 'var(--text-muted)';
      }
      
      if (audioEnabled && audioCtx) {
        const cloudShift = 1 + (mph / 110); 
        choir.forEach((osc, i) => {
          const base = [1.0, 1.49, 1.88, 2.1][i];
          osc.frequency.linearRampToValueAtTime(220 * base * cloudShift, now + 0.15);
        });
        vibratoLFO.frequency.linearRampToValueAtTime(1.8 + (mph / 9), now + 0.15);
        vibratoGain.gain.linearRampToValueAtTime(3 + (mph / 4), now + 0.15);
        gainIdle.gain.linearRampToValueAtTime(0.005 + (mph / 300), now + 0.15);
        filter.frequency.linearRampToValueAtTime(1000 + (mph * 45), now + 0.15);
      }
    }

    document.getElementById('secret-trigger').addEventListener('click', () => {
      isSimMode = !isSimMode;
      simStatus.textContent = isSimMode ? "SIM: ACTIVE" : "SIM: OFF";
      simStatus.style.color = isSimMode ? "var(--accent-orange)" : "var(--text-muted)";
      debugLabel.classList.toggle('visible', isSimMode);
      if (!isSimMode) updateSystem(0);
    });

    const handleTouch = (e) => {
      if (!isSimMode) return;
      const touch = e.touches ? e.touches[0] : e;
      const rect = interactionZone.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      const margin = rect.width * 0.12; // Adjusted margin
      const usableWidth = rect.width - (margin * 2);
      const relativeX = Math.min(Math.max(x - margin, 0), usableWidth);
      updateSystem((relativeX / usableWidth) * 85);
    };

    interactionZone.addEventListener('touchstart', handleTouch);
    interactionZone.addEventListener('touchmove', handleTouch);
    interactionZone.addEventListener('mousedown', () => window.addEventListener('mousemove', handleTouch));
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', handleTouch));

    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (!isSimMode) {
          gpsDot.classList.add('active');
          gpsText.textContent = "GPS LINKED";
          gpsText.classList.add('linked');
          updateSystem(pos.coords.speed > 0 ? pos.coords.speed * 2.237 : 0, pos.coords.accuracy);
        }
      }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    resizeCanvas();
    startGPS();

    // Register empty Service Worker to make it "Installable"
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch", (e) => e.respondWith(fetch(e.request)));');
    }
  </script>
</body>
</html>
