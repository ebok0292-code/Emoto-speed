<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>E-Moto AVAS System</title>
  <style>
    /* ── BASE & TYPOGRAPHY ── */
    :root {
      --bg-color: #0b0c10;
      --surface-color: #1f2833;
      --accent-cyan: #66fcf1;
      --accent-teal: #45a29e;
      --text-main: #c5c6c7;
      --text-muted: #7a7a7a;
      --warning: #ffaa00;
      --danger: #ff4400;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      /* Using dvh (dynamic viewport height) to prevent mobile browser cutoff */
      height: 100vh;
      height: 100dvh; 
      overflow: hidden;
      user-select: none;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 20;
    }

    .app-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 5px 10px;
      border-radius: 20px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background-color: var(--danger);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--danger);
      transition: all 0.3s;
    }

    .status-dot.active {
      background-color: var(--accent-cyan);
      box-shadow: 0 0 10px var(--accent-cyan);
    }

    /* ── MAIN DASHBOARD ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .speed-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: -20px; /* Slight offset for visual balance */
    }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(100px, 40vw, 160px); /* Responsive sizing */
      font-weight: 900;
      line-height: 0.8;
      color: var(--accent-cyan);
      text-shadow: 0 0 40px rgba(102, 252, 241, 0.4);
    }

    #unit {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 10px;
      color: var(--accent-teal);
      margin-top: 10px;
      margin-right: -10px;
    }

    #status-text {
      position: absolute;
      bottom: 30px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── BOTTOM CONTROLS ── */
    .controls-bar {
      width: 100%;
      padding: 15px 20px 25px 20px; /* Extra bottom padding for mobile home bars */
      display: flex;
      gap: 12px;
      background: var(--surface-color);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 20;
    }

    button {
      flex: 1;
      padding: 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    button.active-toggle {
      background: rgba(102, 252, 241, 0.1);
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    .btn-icon { font-size: 16px; }

    /* ── MODAL ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(11, 12, 16, 0.98);
      backdrop-filter: blur(10px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-title {
      color: var(--text-main);
      font-size: 14px;
      letter-spacing: 4px;
      margin-bottom: 30px;
    }

    .sound-list {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sound-opt {
      padding: 18px;
      background: var(--surface-color);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 2px;
    }

    .sound-opt.active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(102, 252, 241, 0.05);
    }

    .sound-opt.locked { opacity: 0.3; }

    /* ── DEBUG PANEL ── */
    #debug-panel {
      position: absolute;
      top: 65px;
      right: 15px;
      background: var(--surface-color);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 50;
      width: 200px;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .debug-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .switch { position: relative; width: 34px; height: 18px; }
    .switch input { display: none; }
    .slider-toggle { position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .slider-toggle:before { content: ''; position: absolute; width: 12px; height: 12px; left: 2px; top: 2px; background: #555; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider-toggle { background: rgba(255,170,0,0.2); border-color: var(--warning); }
    input:checked + .slider-toggle:before { transform: translateX(16px); background: var(--warning); }

    #manual-slider { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(0,0,0,0.5); border-radius: 2px; }
    #manual-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--warning); }

    #secret-trigger {
      position: absolute;
      top: 0; left: 0; width: 80px; height: 60px; z-index: 30;
    }
  </style>
</head>
<body>

  <div id="secret-trigger"></div>

  <header>
    <div class="app-title">AVAS Core</div>
    <div class="status-indicator">
      <div class="status-dot" id="gps-dot"></div>
      <span id="gps-text">GPS: WAIT</span>
    </div>
  </header>

  <main>
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="status-text">ACQUIRING SIGNAL...</div>
  </main>

  <div class="controls-bar">
    <button id="audio-btn">
      <span class="btn-icon">🔈</span>
      <span>AVAS OFF</span>
    </button>
    <button id="menu-btn">
      <span class="btn-icon">⚙️</span>
      <span>PROFILE</span>
    </button>
  </div>

  <div id="debug-panel">
    <div class="debug-row">
      <span>SIMULATE</span>
      <label class="switch"><input type="checkbox" id="debug-check"><span class="slider-toggle"></span></label>
    </div>
    <div id="slider-container" style="display: none; flex-direction: column; gap: 8px;">
      <input type="range" id="manual-slider" min="0" max="80" value="0" step="1">
      <div id="debug-speed-label" style="font-size: 10px; color: var(--warning); text-align: center;">0 MPH</div>
    </div>
  </div>

  <div id="modal">
    <div class="modal-title">ACOUSTIC PROFILES</div>
    <div class="sound-list">
      <div class="sound-opt active" data-type="tesla">1. TESLA (GHOST WHINE)</div>
      <div class="sound-opt locked">2. SLOT 2 (LOCKED)</div>
      <div class="sound-opt locked">3. SLOT 4 (LOCKED)</div>
      <button id="close-modal">CLOSE</button>
    </div>
  </div>

  <script>
    const speedEl = document.getElementById('speed');
    const statusText = document.getElementById('status-text');
    const gpsDot = document.getElementById('gps-dot');
    const gpsText = document.getElementById('gps-text');
    const audioBtn = document.getElementById('audio-btn');
    const audioIcon = audioBtn.querySelector('.btn-icon');
    const audioLabel = audioBtn.querySelector('span:nth-child(2)');
    const menuBtn = document.getElementById('menu-btn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('close-modal');
    const secretTrigger = document.getElementById('secret-trigger');
    const debugPanel = document.getElementById('debug-panel');
    const debugCheck = document.getElementById('debug-check');
    const sliderContainer = document.getElementById('slider-container');
    const manualSlider = document.getElementById('manual-slider');
    const debugSpeedLabel = document.getElementById('debug-speed-label');

    let audioCtx, osc1, osc2, gainNode, filter, compressor;
    let audioEnabled = false;
    let gpsWatchId = null;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      osc1 = audioCtx.createOscillator();
      osc2 = audioCtx.createOscillator();
      gainNode = audioCtx.createGain();
      filter = audioCtx.createBiquadFilter();
      compressor = audioCtx.createDynamicsCompressor();

      osc1.type = 'sine'; 
      osc2.type = 'sine'; 
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(3000, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(compressor);
      compressor.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc1.start();
      osc2.start();
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      if (audioEnabled) {
        audioCtx.resume();
        audioBtn.classList.add('active-toggle');
        audioIcon.textContent = '🔊';
        audioLabel.textContent = 'AVAS ON';
        statusText.textContent = "SYSTEM ARMED";
      } else {
        audioBtn.classList.remove('active-toggle');
        audioIcon.textContent = '🔈';
        audioLabel.textContent = 'AVAS OFF';
        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        statusText.textContent = "SYSTEM MUTED";
      }
    });

    function updateSystem(mph) {
      speedEl.textContent = Math.max(0, Math.round(mph));
      if (audioEnabled && audioCtx) {
        // High-pitched ramp: 40mph is the "climax" of the pitch
        const baseFreq = 80 + (mph * 3);
        const whineFreq = 250 + (mph * 20); 
        osc1.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.1);
        osc2.frequency.setTargetAtTime(whineFreq, audioCtx.currentTime, 0.1);
        const vol = mph > 0.5 ? Math.min(0.4, 0.1 + (mph / 45)) : 0;
        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
      }
      if (mph < 20) speedEl.style.color = 'var(--accent-cyan)';
      else if (mph < 40) speedEl.style.color = 'var(--warning)';
      else speedEl.style.color = 'var(--danger)';
    }

    function startGPS() {
      if (!navigator.geolocation) return;
      if (gpsWatchId) navigator.geolocation.clearWatch(gpsWatchId);
      gpsWatchId = navigator.geolocation.watchPosition(
        (pos) => {
          if (!debugCheck.checked) {
            gpsDot.classList.add('active');
            gpsText.textContent = "GPS: LOCK";
            const s = pos.coords.speed;
            updateSystem(s !== null && s > 0 ? s * 2.237 : 0);
          }
        },
        null,
        { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );
    }

    menuBtn.addEventListener('click', () => modal.style.display = 'flex');
    closeModal.addEventListener('click', () => modal.style.display = 'none');

    let debugOpen = false;
    secretTrigger.addEventListener('click', () => {
      debugOpen = !debugOpen;
      debugPanel.style.display = debugOpen ? 'flex' : 'none';
    });

    debugCheck.addEventListener('change', function() {
      sliderContainer.style.display = this.checked ? 'flex' : 'none';
      if (!this.checked) startGPS();
    });

    manualSlider.addEventListener('input', function() {
      const val = parseFloat(this.value);
      debugSpeedLabel.textContent = val + ' MPH';
      updateSystem(val);
    });

    startGPS();
  </script>
</body>
</html>
