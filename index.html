<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0b0f">
  <link rel="manifest" href="manifest.json">
  <title>E-Moto AVAS System V1.18</title>
  <style>
    :root {
      --bg-color: #0a0b0f;
      --text-main: #e0e0e0;
      --text-muted: #555b66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
      user-select: none; touch-action: none;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.015) 0%, transparent 70%),
        url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27 viewBox=%270 0 100 100%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%27 height=%27100%27 filter=%27url(%23n)%27 opacity=%270.035%27/%3E%3C/svg%27') repeat;
      pointer-events: none; z-index: 1; mix-blend-mode: overlay;
    }

    /* ── Settings trigger (top-left) ── */
    #settings-trigger {
      position: fixed;
      top: 14px; left: 14px;
      /* Large invisible hit area — the visible label is inside */
      padding: 14px 18px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--text-muted);
      z-index: 30;
      cursor: pointer;
      touch-action: auto;
      transition: color 0.3s;
    }
    #settings-trigger:active { color: var(--text-main); }

    .settings-icon {
      width: 9px; height: 9px;
      border: 1.5px solid currentColor;
      border-radius: 50%;
      flex-shrink: 0;
      transition: box-shadow 0.3s;
    }
    #settings-trigger:active .settings-icon {
      box-shadow: 0 0 8px rgba(255,255,255,0.2);
    }

    /* ── GPS indicator (top-right) ── */
    #gps-indicator {
      position: fixed;
      top: 14px; right: 14px;
      padding: 14px 18px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: var(--text-muted);
      z-index: 30;
      cursor: pointer;
      touch-action: auto;
      transition: color 0.3s;
    }

    .gps-dot {
      width: 9px; height: 9px;
      background-color: #222;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.4s ease;
    }
    .gps-dot.active {
      background-color: #00ff88;
      box-shadow: 0 0 12px #00ff88;
    }

    /* GPS expanded panel — slides down from top-right */
    #gps-panel {
      position: fixed;
      top: 62px; right: 14px;
      width: 200px;
      background: rgba(16, 18, 24, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 18px;
      z-index: 29;
      touch-action: auto;
      transform: translateY(-8px) scale(0.97);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.23,1,0.32,1);
    }
    #gps-panel.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }

    .gps-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .gps-row:last-child { margin-bottom: 0; }

    .gps-row-label {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-muted);
    }
    .gps-row-value {
      font-size: 11px; font-weight: 900; font-family: 'Courier New', monospace;
      color: var(--text-main);
    }
    .gps-row-value.good { color: #00ff88; }
    .gps-row-value.warn { color: #ff9d00; }

    /* ── Settings modal ── */
    #settings-modal {
      position: fixed; inset: 0;
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      touch-action: auto;
    }
    #settings-modal.open { opacity: 1; pointer-events: all; }

    .modal-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .modal-card {
      position: relative;
      width: 100%; max-width: 320px;
      background: rgba(16, 18, 24, 0.96);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 22px;
      padding: 26px 22px 30px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      z-index: 1;
      touch-action: auto;
      transform: scale(0.94) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.23,1,0.32,1);
    }
    #settings-modal.open .modal-card { transform: scale(1) translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 26px;
    }
    .modal-title {
      font-size: 11px; font-weight: 900; letter-spacing: 4px;
      text-transform: uppercase; color: var(--text-muted);
    }
    .modal-close {
      width: 30px; height: 30px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 13px; color: var(--text-muted);
      transition: all 0.2s; touch-action: auto;
    }
    .modal-close:active { background: rgba(255,255,255,0.14); color: var(--text-main); }

    .setting-row { margin-bottom: 24px; }
    .setting-row:last-child { margin-bottom: 0; }

    .setting-label {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .setting-name {
      font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text-muted);
    }
    .setting-value {
      font-size: 11px; font-weight: 900; font-family: 'Courier New', monospace;
      color: var(--text-main); min-width: 36px; text-align: right;
    }

    .setting-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; outline: none; cursor: pointer;
      touch-action: auto;
    }
    .setting-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--text-main);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
      cursor: pointer;
    }
    .setting-slider::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--text-main); border: none; cursor: pointer;
    }

    .setting-divider {
      height: 1px; background: rgba(255,255,255,0.05); margin-bottom: 24px;
    }

    /* KMH toggle row */
    .setting-toggle {
      display: flex; justify-content: space-between; align-items: center;
    }
    .toggle-switch {
      width: 42px; height: 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px; position: relative;
      cursor: pointer; transition: background 0.3s; touch-action: auto;
    }
    .toggle-switch.on { background: rgba(0,255,136,0.35); }
    .toggle-knob {
      position: absolute; top: 4px; left: 4px;
      width: 16px; height: 16px;
      background: var(--text-muted); border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.23,1,0.32,1), background 0.3s;
    }
    .toggle-switch.on .toggle-knob { transform: translateX(18px); background: #00ff88; }

    /* ── Main layout ── */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; z-index: 10;
    }

    .speed-container {
      pointer-events: all;
      display: flex; flex-direction: column; align-items: center;
    }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(125px, 40vh, 290px);
      font-weight: 900; line-height: 0.72;
      cursor: pointer; touch-action: auto;
      transition: color 0.45s ease, text-shadow 0.45s ease, transform 0.28s cubic-bezier(0.23,1,0.32,1);
    }

    #unit {
      font-size: 16px; font-weight: 900; letter-spacing: 22px;
      color: var(--text-muted); margin-top: 8px;
      cursor: pointer; touch-action: auto; transition: color 0.3s;
      pointer-events: all;
    }
    #unit:active { color: #00f2ff; }

    #debug-label {
      position: absolute; top: 32px; left: 50%;
      transform: translateX(-50%);
      font-size: 9.5px; color: #ff9d00;
      letter-spacing: 3px; font-weight: 900;
      opacity: 0; transition: opacity 0.4s; text-transform: uppercase;
      background: rgba(255,157,0,0.08); padding: 4px 12px; border-radius: 20px;
      pointer-events: none;
    }
    #debug-label.visible { opacity: 1; }

    .controls-bar {
      width: 100%;
      padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 32px) 24px;
      display: flex; justify-content: center; z-index: 20; flex-shrink: 0;
    }

    button {
      width: 100%; max-width: 340px; padding: 24px 32px;
      background: rgba(20,22,28,0.85); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08); color: var(--text-main);
      font-size: 13.5px; font-weight: 900; letter-spacing: 5.5px; border-radius: 18px;
      text-transform: uppercase; transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); cursor: pointer;
      touch-action: auto;
    }
    button.active-toggle {
      border-color: #00ff88; color: #00ff88;
      background: rgba(0,255,136,0.08);
      box-shadow: 0 0 25px rgba(0,255,136,0.25);
      animation: pulse-glow 2s infinite ease-in-out;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 25px rgba(0,255,136,0.25); }
      50%       { box-shadow: 0 0 35px rgba(0,255,136,0.45); }
    }

    @media (orientation: landscape) {
      #speed { font-size: clamp(105px, 34vw, 240px); }
    }
  </style>
</head>
<body>

  <!-- Settings trigger — large padded hit area, top-left -->
  <div id="settings-trigger">
    <div class="settings-icon"></div>
    <span>SET</span>
  </div>

  <!-- Settings modal — volume + unit only -->
  <div id="settings-modal">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <div class="modal-close" id="modal-close">✕</div>
      </div>

      <!-- Volume -->
      <div class="setting-row">
        <div class="setting-label">
          <span class="setting-name">Volume</span>
          <span class="setting-value" id="vol-val">50%</span>
        </div>
        <input type="range" class="setting-slider" id="vol-slider" min="0" max="100" value="50">
      </div>

      <div class="setting-divider"></div>

      <!-- KMH toggle -->
      <div class="setting-row">
        <div class="setting-toggle">
          <span class="setting-name">KM/H Mode</span>
          <div class="toggle-switch" id="unit-toggle">
            <div class="toggle-knob"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- GPS indicator — tap to expand info panel -->
  <div id="gps-indicator">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="gps-text">GPS</span>
  </div>

  <!-- GPS info panel -->
  <div id="gps-panel">
    <div class="gps-row">
      <span class="gps-row-label">Status</span>
      <span class="gps-row-value" id="gps-status-val">Searching</span>
    </div>
    <div class="gps-row">
      <span class="gps-row-label">Accuracy</span>
      <span class="gps-row-value" id="gps-acc-val">—</span>
    </div>
    <div class="gps-row">
      <span class="gps-row-label">Raw Speed</span>
      <span class="gps-row-value" id="gps-raw-val">—</span>
    </div>
    <div class="gps-row">
      <span class="gps-row-label">Smoothed</span>
      <span class="gps-row-value" id="gps-smooth-val">—</span>
    </div>
    <div class="gps-row">
      <span class="gps-row-label">Satellites</span>
      <span class="gps-row-value" id="gps-sat-val">—</span>
    </div>
  </div>

  <main id="interaction-zone">
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="debug-label">LAB MODE</div>
  </main>

  <div class="controls-bar">
    <button id="audio-btn">Standby</button>
  </div>

  <script>
    const speedEl         = document.getElementById('speed');
    const unitEl          = document.getElementById('unit');
    const gpsDot          = document.getElementById('gps-dot');
    const gpsText         = document.getElementById('gps-text');
    const audioBtn        = document.getElementById('audio-btn');
    const debugLabel      = document.getElementById('debug-label');
    const interactionZone = document.getElementById('interaction-zone');

    let audioCtx, gainIdle, filter, masterVol, analyser;
    let choir = [], vibratoLFO, vibratoGain;
    let audioEnabled = false;
    let isSimMode    = false;
    let currentSpeed = 0;
    let isKmh        = false;
    let lastSpeed    = 0;
    let volumeLevel  = 0.50; // 50% default

    // ── GPS smoothing ─────────────────────────────────────────────────────────
    // Rolling median (4 samples) + adaptive EMA. Hard-coded to "medium" —
    // alpha 0.12 at low speed, 0.38 at 30mph+. Spike guard for jumps >18mph.
    let gpsSmoothed = 0;
    let gpsReadings = [];

    function smoothGPS(rawMph) {
      gpsReadings.push(rawMph);
      if (gpsReadings.length > 4) gpsReadings.shift();
      const sorted   = [...gpsReadings].sort((a, b) => a - b);
      const median   = sorted[Math.floor(sorted.length / 2)];
      const alpha    = Math.min(0.12 + (gpsSmoothed / 30) * 0.26, 0.38);
      const delta    = Math.abs(median - gpsSmoothed);
      const eff      = delta > 18 ? alpha * 0.25 : alpha;
      gpsSmoothed    = gpsSmoothed + eff * (median - gpsSmoothed);
      return Math.max(0, gpsSmoothed);
    }

    // ── Audio init ────────────────────────────────────────────────────────────
    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;

      filter = audioCtx.createBiquadFilter();
      filter.type            = 'lowpass';
      filter.frequency.value = 1200;

      // masterVol sits after gainIdle — volume slider controls this
      // Max gain 3.0 so 100% is genuinely loud. 50% = 1.5 (current default)
      masterVol = audioCtx.createGain();
      masterVol.gain.value = volumeLevel * 3.0;

      gainIdle = audioCtx.createGain();
      // Idle audible from the start — 0.045 base (louder than before)
      gainIdle.gain.setValueAtTime(0.045, audioCtx.currentTime);

      vibratoLFO  = audioCtx.createOscillator();
      vibratoGain = audioCtx.createGain();
      vibratoLFO.frequency.value = 2.2;
      vibratoGain.gain.value     = 4;
      vibratoLFO.connect(vibratoGain);
      vibratoLFO.start();

      const ratios = [1.0, 1.35, 1.72, 2.05, 2.45];
      choir = ratios.map((ratio, i) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.type            = i === 4 ? 'sawtooth' : 'sine';
        osc.frequency.value = 180 * ratio;
        g.gain.value        = i === 4 ? 0.08 : 0.14;
        vibratoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(gainIdle);
        g.connect(analyser);
        osc.start();
        return osc;
      });

      gainIdle.connect(masterVol);
      masterVol.connect(filter);
      filter.connect(audioCtx.destination);
    }

    // ── Audio button ──────────────────────────────────────────────────────────
    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? 'Active' : 'Standby';
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      if (audioEnabled) {
        audioCtx.resume().then(() => updateSystem(currentSpeed));
      } else {
        gainIdle.gain.cancelScheduledValues(audioCtx.currentTime);
        gainIdle.gain.setTargetAtTime(0.0001, audioCtx.currentTime, 0.1);
        setTimeout(() => { if (!audioEnabled) audioCtx.suspend(); }, 400);
      }
    });

    // ── System update ─────────────────────────────────────────────────────────
    function updateSystem(mph) {
      currentSpeed = Math.max(0, mph);
      const display = isKmh ? Math.round(currentSpeed * 1.60934) : Math.round(currentSpeed);

      if (Math.abs(currentSpeed - lastSpeed) > 0.5) {
        speedEl.style.transform = 'scale(0.92) translateY(-8px)';
        setTimeout(() => {
          speedEl.textContent    = display;
          speedEl.style.transform = 'scale(1) translateY(0)';
        }, 16);
      } else {
        speedEl.textContent = display;
      }
      lastSpeed = currentSpeed;

      // Speed-reactive color
      let hue, lightness = 68;
      if      (currentSpeed <= 20) hue = 140;
      else if (currentSpeed <= 30) hue = 140 - ((currentSpeed - 20) / 10) * 50;
      else if (currentSpeed <= 45) hue = 90  - ((currentSpeed - 30) / 15) * 45;
      else if (currentSpeed <= 60) hue = 45  - ((currentSpeed - 45) / 15) * 30;
      else { hue = 15; lightness = Math.max(48, 68 - (currentSpeed - 60) * 1.8); }

      const glow = currentSpeed > 55 ? 0.75 : 0.48;
      speedEl.style.color      = `hsl(${hue},100%,${lightness}%)`;
      speedEl.style.textShadow = `0 0 58px hsla(${hue},100%,75%,${glow}), 0 0 115px hsla(${hue},100%,68%,0.38)`;

      if (!audioEnabled || !audioCtx) return;

      const now   = audioCtx.currentTime;
      const ramp  = Math.max(0.18 - (currentSpeed / 85) * 0.12, 0.06);
      const sf    = currentSpeed / 45;
      const shift = 1 + (currentSpeed / 75);

      choir.forEach((osc, i) => {
        osc.frequency.setTargetAtTime(180 * [1.0,1.35,1.72,2.05,2.45][i] * shift, now, ramp);
      });

      vibratoLFO.frequency.setTargetAtTime(2.2 + sf * 6.5,          now, ramp);
      vibratoGain.gain.setTargetAtTime(4 + sf * 5.5,                 now, ramp);
      // Idle gain: 0.045 at 0mph (audible hum), scales up with speed
      gainIdle.gain.setTargetAtTime(0.045 + (currentSpeed / 120),    now, ramp);
      filter.frequency.setTargetAtTime(1050 + (currentSpeed * 62),   now, ramp);
    }

    // ── Settings ──────────────────────────────────────────────────────────────
    const settingsModal   = document.getElementById('settings-modal');
    const modalBackdrop   = document.getElementById('modal-backdrop');
    const modalClose      = document.getElementById('modal-close');
    const settingsTrigger = document.getElementById('settings-trigger');

    settingsTrigger.addEventListener('click', () => settingsModal.classList.add('open'));
    modalClose.addEventListener('click',      () => settingsModal.classList.remove('open'));
    modalBackdrop.addEventListener('click',   () => settingsModal.classList.remove('open'));

    // Volume
    const volSlider = document.getElementById('vol-slider');
    const volVal    = document.getElementById('vol-val');
    volSlider.addEventListener('input', () => {
      volumeLevel = volSlider.value / 100;
      volVal.textContent = `${volSlider.value}%`;
      if (masterVol && audioCtx) {
        masterVol.gain.setTargetAtTime(volumeLevel * 3.0, audioCtx.currentTime, 0.05);
      }
    });

    // KMH toggle in settings — stays in sync with unit label tap
    const unitToggle = document.getElementById('unit-toggle');
    unitToggle.addEventListener('click', () => {
      isKmh = !isKmh;
      unitToggle.classList.toggle('on', isKmh);
      unitEl.textContent = isKmh ? 'KM/H' : 'MPH';
      updateSystem(currentSpeed);
    });

    // Unit label tap
    unitEl.addEventListener('click', (e) => {
      e.stopPropagation();
      isKmh = !isKmh;
      unitEl.textContent = isKmh ? 'KM/H' : 'MPH';
      unitToggle.classList.toggle('on', isKmh);
      updateSystem(currentSpeed);
    });

    // ── GPS panel ─────────────────────────────────────────────────────────────
    const gpsIndicator  = document.getElementById('gps-indicator');
    const gpsPanel      = document.getElementById('gps-panel');
    const gpsStatusVal  = document.getElementById('gps-status-val');
    const gpsAccVal     = document.getElementById('gps-acc-val');
    const gpsRawVal     = document.getElementById('gps-raw-val');
    const gpsSmoothVal  = document.getElementById('gps-smooth-val');
    const gpsSatVal     = document.getElementById('gps-sat-val');
    let gpsPanelOpen    = false;

    gpsIndicator.addEventListener('click', () => {
      gpsPanelOpen = !gpsPanelOpen;
      gpsPanel.classList.toggle('open', gpsPanelOpen);
    });

    // Close GPS panel if settings opens (avoid z overlap)
    settingsTrigger.addEventListener('click', () => {
      gpsPanelOpen = false;
      gpsPanel.classList.remove('open');
    });

    function updateGPSPanel(pos, rawMph, smoothMph) {
      const acc = pos.coords.accuracy;
      gpsStatusVal.textContent  = 'Linked';
      gpsStatusVal.className    = 'gps-row-value good';
      gpsAccVal.textContent     = `±${Math.round(acc)}m`;
      gpsAccVal.className       = `gps-row-value ${acc < 10 ? 'good' : acc < 25 ? '' : 'warn'}`;
      gpsRawVal.textContent     = `${rawMph.toFixed(1)} mph`;
      gpsSmoothVal.textContent  = `${smoothMph.toFixed(1)} mph`;
      // altitudeAccuracy is a rough proxy for satellite quality — not always available
      gpsSatVal.textContent     = pos.coords.altitudeAccuracy != null
        ? `${Math.round(pos.coords.altitudeAccuracy)}m alt acc`
        : 'N/A';
    }

    // ── Sim mode — tap the speed number ──────────────────────────────────────
    speedEl.addEventListener('click', (e) => {
      e.stopPropagation();
      isSimMode = !isSimMode;
      debugLabel.classList.toggle('visible', isSimMode);
      if (!isSimMode) updateSystem(0);
    });

    // ── Touch/mouse sim control ───────────────────────────────────────────────
    const handleTouch = (e) => {
      if (!isSimMode) return;
      const touch  = e.touches ? e.touches[0] : e;
      const rect   = interactionZone.getBoundingClientRect();
      const x      = touch.clientX - rect.left;
      const margin = rect.width * 0.12;
      const usable = rect.width - margin * 2;
      const relX   = Math.min(Math.max(x - margin, 0), usable);
      updateSystem((relX / usable) * 85);
    };

    interactionZone.addEventListener('touchstart', handleTouch);
    interactionZone.addEventListener('touchmove',  handleTouch);
    interactionZone.addEventListener('mousedown',  () => window.addEventListener('mousemove', handleTouch));
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', handleTouch));

    // ── GPS ───────────────────────────────────────────────────────────────────
    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (isSimMode) return;
        gpsDot.classList.add('active');
        gpsText.style.color = '#00ff88';
        const rawMph    = pos.coords.speed > 0 ? pos.coords.speed * 2.237 : 0;
        const smoothMph = smoothGPS(rawMph);
        updateGPSPanel(pos, rawMph, smoothMph);
        updateSystem(smoothMph);
      }, (err) => {
        gpsStatusVal.textContent = 'Error';
        gpsStatusVal.className   = 'gps-row-value warn';
      }, { enableHighAccuracy: true, maximumAge: 0 });
    }

    startGPS();
  </script>
</body>
</html>
