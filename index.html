<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0b0f">
  <link rel="manifest" href="manifest.json">
  <title>E-Moto AVAS System V2</title>
  <style>
    :root {
      --bg-color: #0a0b0f;
      --text-main: #e0e0e0;
      --text-muted: #555b66;
      --accent: #00ff88;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
      user-select: none; touch-action: none;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.015) 0%, transparent 70%),
                  url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27 viewBox=%270 0 100 100%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%27 height=%27100%27 filter=%27url(%23n)%27 opacity=%270.035%27/%3E%3C/svg%27') repeat;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    /* Tapping top left triggers lab mode */
    #secret-trigger {
      position: fixed;
      top: 0; left: 0;
      width: 100px; height: 100px;
      z-index: 999;
    }

    #gps-indicator {
      position: fixed;
      top: 28px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      z-index: 30;
    }

    .gps-dot {
      width: 9px; height: 9px;
      background-color: #222;
      border-radius: 50%;
      transition: all 0.4s ease;
    }
    .gps-dot.active {
      background-color: var(--accent);
      box-shadow: 0 0 12px var(--accent);
    }

    #settings-toggle {
      position: fixed;
      top: 28px;
      right: 24px;
      color: var(--text-muted);
      z-index: 30;
      cursor: pointer;
      transition: color 0.3s;
    }
    #settings-toggle:hover { color: var(--text-main); }

    main {
      flex: 1; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      position: relative; 
      z-index: 10;
    }

    .speed-container { 
      pointer-events: none; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(125px, 40vh, 290px); 
      font-weight: 900; 
      line-height: 0.72;
      transition: color 0.45s ease, text-shadow 0.45s ease, transform 0.28s cubic-bezier(0.23, 1, 0.32, 1);
    }

    #unit { 
      font-size: 16px; 
      font-weight: 900; 
      letter-spacing: 22px; 
      color: var(--text-muted); 
      margin-top: 8px; 
      cursor: pointer;
      pointer-events: auto;
      transition: color 0.3s;
    }
    #unit:hover { color: #00f2ff; }

    #debug-label {
      position: absolute; 
      top: 32px; 
      left: 50%;
      transform: translateX(-50%);
      font-size: 9.5px; 
      color: #ff9d00;
      letter-spacing: 3px; 
      font-weight: 900;
      opacity: 0; 
      transition: opacity 0.4s; 
      text-transform: uppercase;
      background: rgba(255, 157, 0, 0.08);
      padding: 4px 12px;
      border-radius: 20px;
    }
    #debug-label.visible { opacity: 1; }

    .controls-bar {
      width: 100%;
      padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 32px) 24px;
      display: flex; 
      justify-content: center; 
      z-index: 20; 
      flex-shrink: 0;
    }

    button.primary-btn {
      width: 100%; 
      max-width: 340px; 
      padding: 24px 32px;
      background: rgba(20, 22, 28, 0.85); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08); 
      color: var(--text-main);
      font-size: 13.5px; 
      font-weight: 900; 
      letter-spacing: 5.5px; 
      border-radius: 18px;
      text-transform: uppercase; 
      transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    button.primary-btn.active-toggle {
      border-color: var(--accent); 
      color: var(--accent);
      background: rgba(0, 255, 136, 0.08);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.25);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    /* Modal Styles */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 0.3s;
    }
    .modal.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .modal-content {
      background: #12141a;
      width: 90%;
      max-width: 360px;
      border-radius: 24px;
      padding: 32px 24px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .modal-header {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 32px;
      color: var(--text-main);
    }
    .setting-group {
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .setting-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .setting-group label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .setting-val {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }
    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
    }
    select {
      width: 100%;
      padding: 12px;
      background: #0a0b0f;
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    .close-modal-btn {
      width: 100%;
      padding: 16px;
      margin-top: 16px;
      background: var(--text-main);
      color: var(--bg-color);
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.25); }
      50% { box-shadow: 0 0 35px rgba(0, 255, 136, 0.45); }
    }

    @media (orientation: landscape) {
      #speed { font-size: clamp(105px, 34vw, 240px); }
    }
  </style>
</head>
