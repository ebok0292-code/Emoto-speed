<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>E-Moto AVAS System V1.16</title>
  <style>
    :root {
      --bg-color: #050608;
      --surface-color: #1f2833;
      --accent-cyan: #66fcf1;
      --accent-teal: #45a29e;
      --text-main: #c5c6c7;
      --text-muted: #3a424a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden; user-select: none;
      touch-action: none;
    }

    /* Ambient Background Visualizer */
    #canvas-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none; opacity: 0.4;
      transition: opacity 0.5s ease;
    }
    .audio-active #canvas-container { opacity: 0.8; }

    header {
      width: 100%; padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20; background: linear-gradient(180deg, rgba(5,6,8,1) 0%, rgba(5,6,8,0) 100%);
    }
    
    .app-title { font-size: 11px; font-weight: 800; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }
    
    .telemetry-bar {
      width: 100%; padding: 8px 24px; display: flex; justify-content: space-between;
      font-size: 9px; font-family: 'Courier New', monospace; letter-spacing: 2px; color: var(--accent-teal);
      z-index: 20; border-bottom: 1px solid rgba(102, 252, 241, 0.05);
    }
    
    .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: 600; color: var(--text-muted); }
    .status-dot { width: 6px; height: 6px; background-color: #440000; border-radius: 50%; transition: all 0.3s; }
    .status-dot.active { background-color: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }

    main { 
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
      position: relative; width: 100%; z-index: 10;
    }
    
    .speed-container { pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    #speed { 
      font-family: 'Courier New', monospace; font-size: clamp(140px, 40vh, 260px); font-weight: 900; 
      line-height: 0.8; color: var(--accent-cyan); 
      transition: text-shadow 0.3s ease;
    }
    .audio-active #speed { text-shadow: 0 0 50px rgba(102, 252, 241, 0.3); }
    #unit { font-size: 14px; font-weight: 700; letter-spacing: 12px; color: var(--accent-teal); margin-top: 10px; }
    
    #debug-label { 
      position: absolute; bottom: 40px; font-size: 9px; color: #ff4400; 
      letter-spacing: 3px; font-weight: 900; opacity: 0; transition: opacity 0.3s;
      text-transform: uppercase;
    }
    #debug-label.visible { opacity: 0.7; }

    .controls-bar { width: 100%; padding: 20px 24px 40px 24px; display: flex; justify-content: center; z-index: 20; }
    button { 
      width: 100%; max-width: 320px; padding: 18px; 
      background: rgba(31, 40, 51, 0.3); backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main); 
      font-size: 11px; font-weight: 800; letter-spacing: 4px; border-radius: 100px; 
      text-transform: uppercase; transition: all 0.3s;
    }
    button.active-toggle { background: rgba(102, 252, 241, 0.1); border-color: var(--accent-cyan); color: var(--accent-cyan); }
    
    #secret-trigger { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 100; }

    @media (orientation: landscape) {
      main { flex-direction: row; }
      #speed { font-size: clamp(120px, 30vw, 280px); }
    }
  </style>
</head>
<body>
  <div id="secret-trigger"></div>
  <div id="canvas-container"><canvas id="visualizer"></canvas></div>
  
  <header>
    <div class="app-title">AVAS Core V1.16</div>
    <div class="status-indicator"><div class="status-dot" id="gps-dot"></div><span id="gps-text">LINKED</span></div>
  </header>
  
  <div class="telemetry-bar">
    <span id="acc-val">SIGNAL: SEARCHING</span>
    <span id="head-val">SIM: OFF</span>
  </div>
  
  <main id="interaction-zone">
    <div class="speed-container"><div id="speed">0</div><div id="unit">MPH</div></div>
    <div id="debug-label">Simulation Bounds Active</div>
  </main>
  
  <div class="controls-bar"><button id="audio-btn">Ignition Off</button></div>

  <script>
    const speedEl = document.getElementById('speed');
    const gpsDot = document.getElementById('gps-dot');
    const accVal = document.getElementById('acc-val');
    const simVal = document.getElementById('head-val');
    const audioBtn = document.getElementById('audio-btn');
    const debugLabel = document.getElementById('debug-label');
    const interactionZone = document.getElementById('interaction-zone');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    let audioCtx, gainIdle, filter, analyser;
    let choir = []; 
    let vibratoLFO, vibratoGain;
    let audioEnabled = false;
    let isSimMode = false;
    let currentSpeed = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvasCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      filter = audioCtx.createBiquadFilter();
      filter.type = "lowpass";
      gainIdle = audioCtx.createGain(); 
      gainIdle.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;

      vibratoLFO = audioCtx.createOscillator();
      vibratoGain = audioCtx.createGain();
      vibratoLFO.frequency.value = 1.8; 
      vibratoGain.gain.value = 3; 
      vibratoLFO.connect(vibratoGain);
      vibratoLFO.start();

      const ratios = [1.0, 1.49, 1.88, 2.1]; 
      choir = ratios.map((ratio, index) => {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 220 * ratio;
        g.gain.value = 0.12; 
        vibratoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(gainIdle);
        osc.start();
        return osc;
      });
      
      gainIdle.connect(filter);
      filter.connect(analyser);
      analyser.connect(audioCtx.destination);
      resizeCanvas();
      drawVisualizer();
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvasCtx.clearRect(0, 0, w, h);

      if (!audioEnabled || !analyser) return;

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);

      // Dynamic styling based on speed
      const intensity = Math.min(currentSpeed / 80, 1);
      canvasCtx.lineWidth = 1.5 + (intensity * 4);
      canvasCtx.strokeStyle = `rgba(102, 252, 241, ${0.3 + (intensity * 0.7)})`;
      canvasCtx.beginPath();

      const sliceWidth = w / bufferLength;
      let x = 0;

      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        // Wave height expands with speed
        const y = (v * h / 2) + (Math.sin(i / 10) * intensity * 20);

        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.stroke();
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? "Ignition On" : "Ignition Off";
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      document.body.classList.toggle('audio-active', audioEnabled);
      if (audioEnabled) {
        audioCtx.resume();
        updateSystem(currentSpeed);
      } else {
        gainIdle.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
      }
    });

    function updateSystem(mph, accuracy = null) {
      currentSpeed = mph;
      const now = audioCtx ? audioCtx.currentTime : 0;
      speedEl.textContent = Math.max(0, Math.round(mph));
      if (accuracy !== null) accVal.textContent = `SIGNAL: ±${Math.round(accuracy)}M`;
      
      if (audioEnabled && audioCtx) {
        const cloudShift = 1 + (mph / 110); 
        choir.forEach((osc, i) => {
          const base = [1.0, 1.49, 1.88, 2.1][i];
          osc.frequency.linearRampToValueAtTime(220 * base * cloudShift, now + 0.15);
        });
        vibratoLFO.frequency.linearRampToValueAtTime(1.8 + (mph / 9), now + 0.15);
        vibratoGain.gain.linearRampToValueAtTime(3 + (mph / 4), now + 0.15);
        gainIdle.gain.linearRampToValueAtTime(0.005 + (mph / 300), now + 0.15);
        filter.frequency.linearRampToValueAtTime(1000 + (mph * 45), now + 0.15);
      }
    }

    document.getElementById('secret-trigger').addEventListener('click', () => {
      isSimMode = !isSimMode;
      simVal.textContent = isSimMode ? "SIM: ACTIVE" : "SIM: OFF";
      simVal.style.color = isSimMode ? "#66fcf1" : "#45a29e";
      debugLabel.classList.toggle('visible', isSimMode);
      if (!isSimMode) updateSystem(0);
    });

    const handleTouch = (e) => {
      if (!isSimMode) return;
      const touch = e.touches ? e.touches[0] : e;
      const rect = interactionZone.getBoundingClientRect();
      const x = touch.clientX - rect.left;
      
      // BOUNDS LOGIC: 10% deadzone on each side
      const margin = rect.width * 0.1;
      const usableWidth = rect.width - (margin * 2);
      const relativeX = Math.min(Math.max(x - margin, 0), usableWidth);
      
      const percent = relativeX / usableWidth;
      updateSystem(percent * 85);
    };

    interactionZone.addEventListener('touchstart', handleTouch);
    interactionZone.addEventListener('touchmove', handleTouch);
    interactionZone.addEventListener('mousedown', () => window.addEventListener('mousemove', handleTouch));
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', handleTouch));

    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (!isSimMode) {
          gpsDot.classList.add('active');
          updateSystem(pos.coords.speed > 0 ? pos.coords.speed * 2.237 : 0, pos.coords.accuracy);
        }
      }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    resizeCanvas();
    startGPS();
  </script>
</body>
</html>
