<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0b0f">
  <link rel="manifest" href="manifest.json">
  <title>E-Moto AVAS System V1.18</title>
  <style>
    :root {
      --bg-color: #0a0b0f;
      --text-main: #e0e0e0;
      --text-muted: #555b66;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
      user-select: none; touch-action: none;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.015) 0%, transparent 70%),
                  url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27100%27 height=%27100%27 viewBox=%270 0 100 100%27%3E%3Cfilter id=%27n%27%3E%3CfeTurbulence type=%27fractalNoise%27 baseFrequency=%270.9%27 numOctaves=%274%27 stitchTiles=%27stitch%27/%3E%3C/filter%3E%3Crect width=%27100%27 height=%27100%27 filter=%27url(%23n)%27 opacity=%270.035%27/%3E%3C/svg%27') repeat;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: overlay;
    }

    #secret-trigger {
      position: fixed;
      top: 0; left: 0;
      width: 100px; height: 100px;
      z-index: 999;
    }

    #gps-indicator {
      position: fixed;
      top: 28px;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      z-index: 30;
    }

    .gps-dot {
      width: 9px; height: 9px;
      background-color: #222;
      border-radius: 50%;
      transition: all 0.4s ease;
    }
    .gps-dot.active {
      background-color: #00ff88;
      box-shadow: 0 0 12px #00ff88;
    }

    main {
      flex: 1; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      position: relative; 
      z-index: 10;
    }

    .speed-container { 
      pointer-events: none; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(125px, 40vh, 290px); 
      font-weight: 900; 
      line-height: 0.72;
      transition: color 0.45s ease, text-shadow 0.45s ease, transform 0.28s cubic-bezier(0.23, 1, 0.32, 1);
    }

    #unit { 
      font-size: 16px; 
      font-weight: 900; 
      letter-spacing: 22px; 
      color: var(--text-muted); 
      margin-top: 8px; 
      cursor: pointer;
      transition: color 0.3s;
    }
    #unit:hover { color: #00f2ff; }

    #debug-label {
      position: absolute; 
      top: 32px; 
      left: 50%;
      transform: translateX(-50%);
      font-size: 9.5px; 
      color: #ff9d00;
      letter-spacing: 3px; 
      font-weight: 900;
      opacity: 0; 
      transition: opacity 0.4s; 
      text-transform: uppercase;
      background: rgba(255, 157, 0, 0.08);
      padding: 4px 12px;
      border-radius: 20px;
    }
    #debug-label.visible { opacity: 1; }

    .controls-bar {
      width: 100%;
      padding: 20px 24px calc(env(safe-area-inset-bottom, 0px) + 32px) 24px;
      display: flex; 
      justify-content: center; 
      z-index: 20; 
      flex-shrink: 0;
    }

    button {
      width: 100%; 
      max-width: 340px; 
      padding: 24px 32px;
      background: rgba(20, 22, 28, 0.85); 
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08); 
      color: var(--text-main);
      font-size: 13.5px; 
      font-weight: 900; 
      letter-spacing: 5.5px; 
      border-radius: 18px;
      text-transform: uppercase; 
      transition: all 0.4s ease;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    button.active-toggle {
      border-color: #00ff88; 
      color: #00ff88;
      background: rgba(0, 255, 136, 0.08);
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.25);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 25px rgba(0, 255, 136, 0.25); }
      50% { box-shadow: 0 0 35px rgba(0, 255, 136, 0.45); }
    }

    @media (orientation: landscape) {
      #speed { font-size: clamp(105px, 34vw, 240px); }
    }
  </style>
</head>
<body>

  <div id="secret-trigger"></div>

  <div id="gps-indicator">
    <div class="gps-dot" id="gps-dot"></div>
    <span id="gps-text">GPS</span>
  </div>

  <main id="interaction-zone">
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="debug-label">LAB MODE</div>
  </main>

  <div class="controls-bar">
    <button id="audio-btn">Standby</button>
  </div>

  <script>
    const speedEl         = document.getElementById('speed');
    const unitEl          = document.getElementById('unit');
    const gpsDot          = document.getElementById('gps-dot');
    const gpsText         = document.getElementById('gps-text');
    const audioBtn        = document.getElementById('audio-btn');
    const debugLabel      = document.getElementById('debug-label');
    const interactionZone = document.getElementById('interaction-zone');

    let audioCtx, gainIdle, filter, analyser;
    let choir = [];
    let vibratoLFO, vibratoGain;
    let audioEnabled = false;
    let isSimMode    = false;
    let currentSpeed = 0;
    let isKmh        = false;
    let lastSpeed    = 0;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;

      filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 1200;

      gainIdle = audioCtx.createGain();
      gainIdle.gain.setValueAtTime(0.0001, audioCtx.currentTime);

      vibratoLFO  = audioCtx.createOscillator();
      vibratoGain = audioCtx.createGain();
      vibratoLFO.frequency.value = 2.2;
      vibratoGain.gain.value     = 4;
      vibratoLFO.connect(vibratoGain);
      vibratoLFO.start();

      const ratios = [1.0, 1.35, 1.72, 2.05, 2.45];
      choir = ratios.map((ratio, i) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.type = i === 4 ? 'sawtooth' : 'sine';
        osc.frequency.value = 180 * ratio;
        g.gain.value = i === 4 ? 0.08 : 0.14;
        vibratoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(gainIdle);
        g.connect(analyser);
        osc.start();
        return osc;
      });

      gainIdle.connect(filter);
      filter.connect(audioCtx.destination);
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? 'Active' : 'Standby';
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      if (audioEnabled) audioCtx.resume();
      updateSystem(currentSpeed);
    });

    function updateSystem(mph) {
      currentSpeed = Math.max(0, mph);
      const displaySpeed = isKmh ? Math.round(currentSpeed * 1.60934) : Math.round(currentSpeed);
      
      // Small animation on number change
      if (Math.abs(currentSpeed - lastSpeed) > 0.5) {
        speedEl.style.transform = 'scale(0.92) translateY(-8px)';
        setTimeout(() => {
          speedEl.textContent = displaySpeed;
          speedEl.style.transform = 'scale(1) translateY(0)';
        }, 16);
      } else {
        speedEl.textContent = displaySpeed;
      }
      lastSpeed = currentSpeed;

      // Smooth color gradient
      let hue, saturation = 100, lightness = 68;
      if (currentSpeed <= 20) {
        hue = 140;
      } else if (currentSpeed <= 30) {
        hue = 140 - ((currentSpeed - 20) / 10) * 50;
      } else if (currentSpeed <= 45) {
        hue = 90 - ((currentSpeed - 30) / 15) * 45;
      } else if (currentSpeed <= 60) {
        hue = 45 - ((currentSpeed - 45) / 15) * 30;
      } else if (currentSpeed <= 65) {
        hue = 15;
      } else {
        hue = 15;
        lightness = Math.max(48, 68 - (currentSpeed - 65) * 1.8);
      }

      const color = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      const glow = currentSpeed > 55 ? 0.75 : 0.48;

      speedEl.style.color = color;
      speedEl.style.textShadow = `
        0 0 58px hsla(${hue}, 100%, 75%, ${glow}),
        0 0 115px hsla(${hue}, 100%, 68%, 0.38)
      `;

      if (audioEnabled && audioCtx) {
        const speedFactor = currentSpeed / 45;  // Warbly/vibrato reaches full intensity much earlier

        const shift = 1 + (currentSpeed / 75);   // Overall pitch rises faster
        choir.forEach((osc, i) => {
          const base = [1.0, 1.35, 1.72, 2.05, 2.45][i];
          osc.frequency.linearRampToValueAtTime(180 * base * shift, audioCtx.currentTime + 0.1);
        });

        // Warbly sound (vibrato) reaches "80 mph level" at \~45 mph and gets even stronger after
        vibratoLFO.frequency.linearRampToValueAtTime(2.2 + (speedFactor * 6.5), audioCtx.currentTime + 0.1);
        vibratoGain.gain.linearRampToValueAtTime(4 + (speedFactor * 5.5), audioCtx.currentTime + 0.1);

        gainIdle.gain.linearRampToValueAtTime(0.009 + (currentSpeed / 180), audioCtx.currentTime + 0.1);
        filter.frequency.linearRampToValueAtTime(1050 + (currentSpeed * 62), audioCtx.currentTime + 0.1); // stronger "cloudy" sweep
      }
    }

    unitEl.addEventListener('click', () => {
      isKmh = !isKmh;
      unitEl.textContent = isKmh ? 'KM/H' : 'MPH';
      updateSystem(currentSpeed);
    });

    document.getElementById('secret-trigger').addEventListener('click', () => {
      isSimMode = !isSimMode;
      debugLabel.classList.toggle('visible', isSimMode);
      if (!isSimMode) updateSystem(0);
    });

    const handleTouch = (e) => {
      if (!isSimMode) return;
      const touch = e.touches ? e.touches[0] : e;
      const rect  = interactionZone.getBoundingClientRect();
      const x     = touch.clientX - rect.left;
      const margin = rect.width * 0.12;
      const usable = rect.width - margin * 2;
      const relX   = Math.min(Math.max(x - margin, 0), usable);
      updateSystem((relX / usable) * 85);
    };

    interactionZone.addEventListener('touchstart', handleTouch);
    interactionZone.addEventListener('touchmove', handleTouch);
    interactionZone.addEventListener('mousedown', () => window.addEventListener('mousemove', handleTouch));
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', handleTouch));

    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (!isSimMode) {
          gpsDot.classList.add('active');
          gpsText.style.color = '#00ff88';
          updateSystem(pos.coords.speed > 0 ? pos.coords.speed * 2.237 : 0);
        }
      }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    startGPS();
  </script>
</body>
</html>
