<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS Core">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#030405">
  <link rel="manifest" href="manifest.json">

  <title>E-Moto AVAS System V1.18</title>
  <style>
    :root {
      --bg-color: #030405;
      --accent-cyan: #00f2ff;
      --accent-green: #00ff88;
      --accent-orange: #ff9d00;
      --accent-violet: #bc13fe;
      --text-main: #e0e0e0;
      --text-muted: #33393f;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden; user-select: none;
      touch-action: none;
    }

    header {
      width: 100%; padding: 25px 24px 10px 24px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20; flex-shrink: 0;
    }
    
    .app-title { font-size: 10px; font-weight: 900; letter-spacing: 5px; color: var(--text-muted); text-transform: uppercase; }
    
    .status-indicator { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 800; color: var(--text-muted); }
    #gps-text.linked { color: var(--accent-green); letter-spacing: 1px; }
    
    .status-dot { width: 10px; height: 10px; background-color: #200; border-radius: 50%; transition: all 0.3s; }
    .status-dot.active { 
      background-color: var(--accent-green); 
      box-shadow: 0 0 15px var(--accent-green);
      animation: blink 1.2s infinite ease-in-out;
    }

    @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.2; transform: scale(0.8); } }

    .telemetry-bar {
      width: 100%; padding: 0 24px 10px 24px; display: flex; justify-content: space-between;
      font-size: 9px; font-family: monospace; letter-spacing: 2px; color: var(--text-muted);
      z-index: 20; flex-shrink: 0;
    }

    /* \u2500\u2500 Visualizer box \u2500\u2500 */
    .visualizer-container {
      width: 100%;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 20;
    }

    .visualizer-box {
      width: 100%;
      height: 130px;
      border: 1px solid rgba(188, 19, 254, 0.35);
      border-radius: 12px;
      background: rgba(188, 19, 254, 0.03);
      position: relative;
      overflow: hidden;
    }

    /* Corner accents */
    .visualizer-box::before,
    .visualizer-box::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent-violet);
      border-style: solid;
      opacity: 0.7;
      z-index: 2;
    }
    .visualizer-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 12px 0 0 0; }
    .visualizer-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 12px 0; }

    #visualizer {
      width: 100%; height: 100%;
      display: block;
    }
    
    main { 
      flex: 1; display: flex; flex-direction: column; align-items: center; 
      justify-content: center; position: relative; z-index: 10; min-height: 0; 
    }
    
    .speed-container { pointer-events: none; display: flex; flex-direction: column; align-items: center; }
    #speed { 
      font-family: 'Courier New', monospace; font-size: clamp(110px, 36vh, 260px); font-weight: 900; 
      line-height: 0.75; color: var(--accent-cyan); 
      text-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
    }
    #unit { font-size: 14px; font-weight: 900; letter-spacing: 18px; color: var(--text-muted); margin-top: 10px; }
    
    #debug-label { 
      position: absolute; bottom: 40px; font-size: 10px; color: var(--accent-orange); 
      letter-spacing: 4px; font-weight: 900; opacity: 0; transition: opacity 0.3s;
      text-transform: uppercase;
    }
    #debug-label.visible { opacity: 1; }

    .controls-bar { 
      width: 100%; padding: 16px 24px 50px 24px; display: flex; 
      justify-content: center; z-index: 20; flex-shrink: 0; 
    }
    button { 
      width: 100%; max-width: 320px; padding: 22px; 
      background: rgba(25, 27, 30, 0.7); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main); 
      font-size: 12px; font-weight: 900; letter-spacing: 5px; border-radius: 16px; 
      text-transform: uppercase; transition: all 0.3s;
    }
    button.active-toggle { 
      border-color: var(--accent-green); color: var(--accent-green); 
      background: rgba(0, 255, 136, 0.05); 
    }
    
    #secret-trigger { position: absolute; top: 0; left: 0; width: 100px; height: 100px; z-index: 100; }

    @media (orientation: landscape) {
      main { flex-direction: row; }
      #speed { font-size: clamp(90px, 28vw, 200px); }
      .controls-bar { padding-bottom: 20px; }
      .visualizer-box { height: 80px; }
    }
  </style>
</head>
<body>
  <div id="secret-trigger"></div>
  
  <header>
    <div class="app-title">AVAS Core V1.18</div>
    <div class="status-indicator">
        <div class="status-dot" id="gps-dot"></div>
        <span id="gps-text">GPS SEARCHING</span>
    </div>
  </header>
  
  <div class="telemetry-bar">
    <span id="acc-val">SIGNAL: --</span>
    <span id="sim-status">SIM: OFF</span>
  </div>

  <div class="visualizer-container">
    <div class="visualizer-box">
      <canvas id="visualizer"></canvas>
    </div>
  </div>
  
  <main id="interaction-zone">
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="debug-label">LAB MODE ACTIVE</div>
  </main>
  
  <div class="controls-bar"><button id="audio-btn">Standby</button></div>
