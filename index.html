<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AVAS Core">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#030405">
  <link rel="manifest" href="manifest.json">
  <title>E-Moto AVAS System V1.18</title>
  <style>
    :root {
      --bg-color: #030405;
      --accent-cyan: #00f2ff;
      --accent-green: #00ff88;
      --accent-orange: #ff9d00;
      --accent-violet: #bc13fe;
      --text-main: #e0e0e0;
      --text-muted: #33393f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
      user-select: none; touch-action: none;
    }

    /* Secret trigger — fixed to viewport top-left, always on top */
    #secret-trigger {
      position: fixed;
      top: 0; left: 0;
      width: 90px; height: 90px;
      z-index: 999;
    }

    header {
      width: 100%; padding: 25px 24px 10px 24px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; z-index: 20;
    }

    .app-title {
      font-size: 10px; font-weight: 900; letter-spacing: 5px;
      color: var(--text-muted); text-transform: uppercase;
    }

    .status-indicator {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; font-weight: 800; color: var(--text-muted);
    }
    #gps-text.linked { color: var(--accent-green); letter-spacing: 1px; }

    .status-dot {
      width: 10px; height: 10px;
      background-color: #200; border-radius: 50%; transition: all 0.3s;
    }
    .status-dot.active {
      background-color: var(--accent-green);
      box-shadow: 0 0 15px var(--accent-green);
      animation: blink 1.2s infinite ease-in-out;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.2; transform: scale(0.8); }
    }

    .telemetry-bar {
      width: 100%; padding: 0 24px 10px 24px;
      display: flex; justify-content: space-between;
      font-size: 9px; font-family: monospace; letter-spacing: 2px;
      color: var(--text-muted); flex-shrink: 0; z-index: 20;
    }

    /* ── Visualizer ── */
    .visualizer-container {
      width: 100%; padding: 0 16px;
      flex-shrink: 0; z-index: 20;
      /* pointer-events off so it never blocks touches to elements below */
      pointer-events: none;
    }

    .visualizer-box {
      width: 100%; height: 130px;
      border: 1px solid rgba(188, 19, 254, 0.35);
      border-radius: 12px;
      background: rgba(188, 19, 254, 0.03);
      position: relative; overflow: hidden;
    }

    .visualizer-box::before,
    .visualizer-box::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent-violet); border-style: solid; opacity: 0.7; z-index: 2;
    }
    .visualizer-box::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 12px 0 0 0; }
    .visualizer-box::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 12px 0; }

    #visualizer { width: 100%; height: 100%; display: block; }

    /* ── Speed ── */
    main {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; z-index: 10; min-height: 0;
    }

    .speed-container { pointer-events: none; display: flex; flex-direction: column; align-items: center; }

    #speed {
      font-family: 'Courier New', monospace;
      font-size: clamp(110px, 36vh, 260px); font-weight: 900; line-height: 0.75;
      color: var(--accent-cyan); text-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
    }
    #unit { font-size: 14px; font-weight: 900; letter-spacing: 18px; color: var(--text-muted); margin-top: 10px; }

    #debug-label {
      position: absolute; bottom: 40px;
      font-size: 10px; color: var(--accent-orange);
      letter-spacing: 4px; font-weight: 900;
      opacity: 0; transition: opacity 0.3s; text-transform: uppercase;
    }
    #debug-label.visible { opacity: 1; }

    /* ── Button — safe-area aware ── */
    .controls-bar {
      width: 100%;
      padding: 16px 24px calc(env(safe-area-inset-bottom, 0px) + 24px) 24px;
      display: flex; justify-content: center; z-index: 20; flex-shrink: 0;
    }

    button {
      width: 100%; max-width: 320px; padding: 22px;
      background: rgba(25, 27, 30, 0.7); backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.05); color: var(--text-main);
      font-size: 12px; font-weight: 900; letter-spacing: 5px; border-radius: 16px;
      text-transform: uppercase; transition: all 0.3s; cursor: pointer;
    }
    button.active-toggle {
      border-color: var(--accent-green); color: var(--accent-green);
      background: rgba(0, 255, 136, 0.05);
    }

    @media (orientation: landscape) {
      main { flex-direction: row; }
      #speed { font-size: clamp(90px, 28vw, 200px); }
      .controls-bar { padding-bottom: 16px; }
      .visualizer-box { height: 80px; }
    }
  </style>
</head>
<body>

  <!-- Fixed to viewport — never blocked by other elements -->
  <div id="secret-trigger"></div>

  <header>
    <div class="app-title">AVAS Core V1.18</div>
    <div class="status-indicator">
      <div class="status-dot" id="gps-dot"></div>
      <span id="gps-text">GPS SEARCHING</span>
    </div>
  </header>

  <div class="telemetry-bar">
    <span id="acc-val">SIGNAL: --</span>
    <span id="sim-status">SIM: OFF</span>
  </div>

  <div class="visualizer-container">
    <div class="visualizer-box">
      <canvas id="visualizer"></canvas>
    </div>
  </div>

  <main id="interaction-zone">
    <div class="speed-container">
      <div id="speed">0</div>
      <div id="unit">MPH</div>
    </div>
    <div id="debug-label">LAB MODE ACTIVE</div>
  </main>

  <div class="controls-bar">
    <button id="audio-btn">Standby</button>
  </div>

  <script>
    const speedEl         = document.getElementById('speed');
    const gpsDot          = document.getElementById('gps-dot');
    const gpsText         = document.getElementById('gps-text');
    const accVal          = document.getElementById('acc-val');
    const simStatus       = document.getElementById('sim-status');
    const audioBtn        = document.getElementById('audio-btn');
    const debugLabel      = document.getElementById('debug-label');
    const interactionZone = document.getElementById('interaction-zone');
    const canvas          = document.getElementById('visualizer');
    const ctx             = canvas.getContext('2d');

    let audioCtx, gainIdle, filter, analyser;
    let choir = [];
    let vibratoLFO, vibratoGain;
    let audioEnabled = false;
    let isSimMode    = false;
    let currentSpeed = 0;
    let smoothSpeed  = 0;

    // ── Canvas resize ────────────────────────────────────────────────────────
    function resizeCanvas() {
      const dpr  = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0) return; // not in DOM yet
      canvas.width  = Math.round(rect.width  * dpr);
      canvas.height = Math.round(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resizeCanvas);

    // ── Wave layers ──────────────────────────────────────────────────────────
    const LAYERS = [
      { color: '#bc13fe', alpha: 0.90, phaseOff: 0,              freqMult: 1.00, ampMult: 1.00, lw: 2.5 },
      { color: '#00f2ff', alpha: 0.55, phaseOff: Math.PI / 2.8,  freqMult: 1.35, ampMult: 0.68, lw: 1.5 },
      { color: '#00ff88', alpha: 0.35, phaseOff: Math.PI / 1.4,  freqMult: 0.72, ampMult: 0.52, lw: 1.2 },
      { color: '#ff9d00', alpha: 0.22, phaseOff: Math.PI * 0.9,  freqMult: 1.90, ampMult: 0.38, lw: 1.0 },
    ];

    // ── Draw loop ────────────────────────────────────────────────────────────
    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);

      const rect = canvas.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      if (W === 0 || H === 0) return;

      ctx.clearRect(0, 0, W, H);

      smoothSpeed += (currentSpeed - smoothSpeed) * 0.07;
      const sf  = Math.min(smoothSpeed / 85, 1);
      const now = performance.now() / 1000;

      if (!audioEnabled) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(188,19,254,0.12)';
        ctx.lineWidth = 1;
        ctx.moveTo(0, H / 2);
        ctx.lineTo(W, H / 2);
        ctx.stroke();
        return;
      }

      let freqData = null;
      if (analyser) {
        freqData = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(freqData);
      }

      const baseAmp   = 7 + sf * H * 0.40;
      const waveSpeed = 1.0 + sf * 4.2;
      const freqDens  = 2.8 + sf * 3.5;
      const STEPS     = 200;

      LAYERS.forEach((layer, li) => {
        ctx.save();
        ctx.beginPath();
        ctx.lineWidth   = layer.lw + sf * layer.lw * 0.9;
        ctx.lineJoin    = 'round';
        ctx.lineCap     = 'round';
        ctx.strokeStyle = layer.color;
        ctx.globalAlpha = layer.alpha;
        ctx.shadowBlur  = li === 0 ? 10 + sf * 20 : 5 + sf * 10;
        ctx.shadowColor = layer.color;

        for (let i = 0; i <= STEPS; i++) {
          const t     = i / STEPS;
          const x     = t * W;
          const phase = (t * Math.PI * 2 * freqDens * layer.freqMult)
                      - (now * waveSpeed * (1 + li * 0.18))
                      + layer.phaseOff;

          let amp = baseAmp * layer.ampMult;
          if (freqData) {
            const bin = Math.floor(t * freqData.length * 0.55);
            amp *= 0.25 + (freqData[bin] / 255) * 1.5;
          }

          const y = (H / 2)
                  + Math.sin(phase) * amp
                  + Math.sin(phase * 2.2 + 0.8) * amp * 0.22;

          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }

        ctx.stroke();
        ctx.restore();
      });
    }

    // ── Audio init ───────────────────────────────────────────────────────────
    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      analyser = audioCtx.createAnalyser();
      analyser.fftSize               = 512;
      analyser.smoothingTimeConstant = 0.85;
      analyser.minDecibels           = -90;
      analyser.maxDecibels           = -10;

      filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';

      gainIdle = audioCtx.createGain();
      gainIdle.gain.setValueAtTime(0.0001, audioCtx.currentTime);

      vibratoLFO  = audioCtx.createOscillator();
      vibratoGain = audioCtx.createGain();
      vibratoLFO.frequency.value = 1.8;
      vibratoGain.gain.value     = 3;
      vibratoLFO.connect(vibratoGain);
      vibratoLFO.start();

      const ratios = [1.0, 1.49, 1.88, 2.1];
      choir = ratios.map((ratio) => {
        const osc = audioCtx.createOscillator();
        const g   = audioCtx.createGain();
        osc.type            = 'sine';
        osc.frequency.value = 220 * ratio;
        g.gain.value        = 0.12;
        vibratoGain.connect(osc.frequency);
        osc.connect(g);
        g.connect(gainIdle);
        g.connect(analyser); // tap pre-attenuation
        osc.start();
        return osc;
      });

      gainIdle.connect(filter);
      filter.connect(audioCtx.destination);
      // analyser NOT in output chain
    }

    // ── Audio button ─────────────────────────────────────────────────────────
    audioBtn.addEventListener('click', () => {
      if (!audioCtx) {
        initAudio();
        resizeCanvas();
      }
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? 'Active' : 'Standby';
      audioBtn.classList.toggle('active-toggle', audioEnabled);
      if (audioEnabled) {
        audioCtx.resume();
        updateSystem(currentSpeed);
      } else {
        gainIdle.gain.linearRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
      }
    });

    // ── System update ────────────────────────────────────────────────────────
    function updateSystem(mph, accuracy = null) {
      currentSpeed = mph;
      const now = audioCtx ? audioCtx.currentTime : 0;
      speedEl.textContent = Math.max(0, Math.round(mph));

      if (accuracy !== null) {
        accVal.textContent = `SIGNAL: ±${Math.round(accuracy)}M`;
        accVal.style.color = accuracy < 10 ? 'var(--accent-green)' : 'var(--text-muted)';
      }

      if (audioEnabled && audioCtx) {
        const cloudShift = 1 + (mph / 110);
        choir.forEach((osc, i) => {
          const base = [1.0, 1.49, 1.88, 2.1][i];
          osc.frequency.linearRampToValueAtTime(220 * base * cloudShift, now + 0.15);
        });
        vibratoLFO.frequency.linearRampToValueAtTime(1.8 + (mph / 9),  now + 0.15);
        vibratoGain.gain.linearRampToValueAtTime(3 + (mph / 4),         now + 0.15);
        gainIdle.gain.linearRampToValueAtTime(0.005 + (mph / 300),      now + 0.15);
        filter.frequency.linearRampToValueAtTime(1000 + (mph * 45),     now + 0.15);
      }
    }

    // ── Secret trigger ───────────────────────────────────────────────────────
    document.getElementById('secret-trigger').addEventListener('click', () => {
      isSimMode = !isSimMode;
      simStatus.textContent = isSimMode ? 'SIM: ACTIVE' : 'SIM: OFF';
      simStatus.style.color = isSimMode ? 'var(--accent-orange)' : 'var(--text-muted)';
      debugLabel.classList.toggle('visible', isSimMode);
      if (!isSimMode) updateSystem(0);
    });

    // ── Sim touch/mouse control ──────────────────────────────────────────────
    const handleTouch = (e) => {
      if (!isSimMode) return;
      const touch       = e.touches ? e.touches[0] : e;
      const rect        = interactionZone.getBoundingClientRect();
      const x           = touch.clientX - rect.left;
      const margin      = rect.width * 0.12;
      const usableWidth = rect.width - margin * 2;
      const relativeX   = Math.min(Math.max(x - margin, 0), usableWidth);
      updateSystem((relativeX / usableWidth) * 85);
    };

    interactionZone.addEventListener('touchstart', handleTouch);
    interactionZone.addEventListener('touchmove',  handleTouch);
    interactionZone.addEventListener('mousedown',  () => window.addEventListener('mousemove', handleTouch));
    window.addEventListener('mouseup', () => window.removeEventListener('mousemove', handleTouch));

    // ── GPS ──────────────────────────────────────────────────────────────────
    function startGPS() {
      navigator.geolocation.watchPosition((pos) => {
        if (!isSimMode) {
          gpsDot.classList.add('active');
          gpsText.textContent = 'GPS LINKED';
          gpsText.classList.add('linked');
          updateSystem(
            pos.coords.speed > 0 ? pos.coords.speed * 2.237 : 0,
            pos.coords.accuracy
          );
        }
      }, null, { enableHighAccuracy: true, maximumAge: 0 });
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    // Wait one frame so the canvas box has laid out before sizing
    requestAnimationFrame(() => {
      resizeCanvas();
      drawVisualizer();
    });
    startGPS();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register(
        'data:text/javascript,self.addEventListener("fetch",(e)=>e.respondWith(fetch(e.request)));'
      );
    }
  </script>
</body>
</html>
