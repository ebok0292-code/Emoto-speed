<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Speed AVAS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #speed {
      font-size: 120px;
      font-weight: bold;
      color: #00ffcc;
      line-height: 1;
      text-shadow: 0 0 30px #00ffcc88;
      transition: color 0.3s;
    }

    #unit { font-size: 28px; color: #444; letter-spacing: 8px; margin-top: 8px; }
    #status { font-size: 13px; color: #333; margin-top: 20px; letter-spacing: 2px; }

    .controls { display: flex; gap: 10px; margin-top: 20px; }

    button {
      padding: 12px 18px;
      background: #111;
      border: 1px solid #444;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      letter-spacing: 1px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    #audio-btn.active { background: #00ffcc33; border-color: #00ffcc; }

    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .sound-opt {
      width: 250px;
      padding: 15px;
      border: 1px solid #333;
      text-align: center;
      color: #888;
      cursor: pointer;
    }

    .sound-opt.active {
      border-color: #00ffcc;
      color: #00ffcc;
      background: #00ffcc11;
    }

    #debug-toggle { margin-top: 40px; display: flex; align-items: center; gap: 12px; }
    .switch { position: relative; width: 48px; height: 26px; }
    .switch input { display: none; }
    .slider-toggle { position: absolute; inset: 0; background: #222; border-radius: 26px; cursor: pointer; }
    .slider-toggle:before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: #444; border-radius: 50%; transition: 0.3s; }
    input:checked + .slider-toggle { background: #ff440033; }
    input:checked + .slider-toggle:before { transform: translateX(22px); background: #ff4400; }
    #debug-panel { display: none; flex-direction: column; align-items: center; gap: 12px; margin-top: 24px; width: 280px; }
    #manual-slider { -webkit-appearance: none; width: 100%; height: 6px; background: #222; outline: none; }
    #manual-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%; background: #ff4400; cursor: pointer; }
    #debug-speed-label { font-size: 13px; color: #ff4400; }
  </style>
</head>
<body>

  <div id="speed">--</div>
  <div id="unit">MPH</div>
  <div id="status">WAITING FOR GPS...</div>

  <div class="controls">
    <button id="audio-btn">AUDIO: OFF</button>
    <button id="menu-btn">SOUNDS</button>
  </div>

  <div id="modal">
    <h2 style="color: #444; margin-bottom: 20px;">SELECT PROFILE</h2>
    <div class="sound-opt active" data-type="sawtooth">1. AGGRESSIVE (SAW)</div>
    <div class="sound-opt" data-type="tesla">2. TESLA WHINE (LAYERED)</div>
    <div class="sound-opt" data-type="square">3. SLOT 3 (LOCKED)</div>
    <div class="sound-opt" data-type="triangle">4. SLOT 4 (LOCKED)</div>
    <div class="sound-opt" data-type="custom">5. SLOT 5 (LOCKED)</div>
    <button id="close-modal" style="margin-top: 30px; border-color: #ff4400; color: #ff4400;">CLOSE</button>
  </div>

  <div id="debug-toggle">
    <span>DEBUG</span>
    <label class="switch"><input type="checkbox" id="debug-check"><span class="slider-toggle"></span></label>
  </div>

  <div id="debug-panel">
    <input type="range" id="manual-slider" min="0" max="80" value="0" step="1">
    <div id="debug-speed-label">0 MPH (SIMULATED)</div>
  </div>

  <script>
    const speedEl = document.getElementById('speed');
    const statusEl = document.getElementById('status');
    const audioBtn = document.getElementById('audio-btn');
    const menuBtn = document.getElementById('menu-btn');
    const modal = document.getElementById('modal');
    const closeModal = document.getElementById('close-modal');
    const soundOpts = document.querySelectorAll('.sound-opt');
    const debugCheck = document.getElementById('debug-check');
    const debugPanel = document.getElementById('debug-panel');
    const manualSlider = document.getElementById('manual-slider');

    let audioCtx, osc1, osc2, gainNode, filter, compressor;
    let audioEnabled = false;
    let currentProfile = 'sawtooth';

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      osc1 = audioCtx.createOscillator();
      osc2 = audioCtx.createOscillator();
      gainNode = audioCtx.createGain();
      filter = audioCtx.createBiquadFilter();
      compressor = audioCtx.createDynamicsCompressor();

      osc1.type = 'sawtooth'; 
      osc2.type = 'sine'; 
      
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(400, audioCtx.currentTime);

      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      
      // Connection Chain
      osc1.connect(filter);
      osc2.connect(filter);
      filter.connect(compressor);
      compressor.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      osc1.start();
      osc2.start();
    }

    audioBtn.addEventListener('click', () => {
      if (!audioCtx) initAudio();
      audioEnabled = !audioEnabled;
      if (audioEnabled) {
        audioBtn.textContent = "AUDIO: ON";
        audioBtn.classList.add('active');
        audioCtx.resume();
      } else {
        audioBtn.textContent = "AUDIO: OFF";
        audioBtn.classList.remove('active');
        gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
      }
    });

    menuBtn.addEventListener('click', () => modal.style.display = 'flex');
    closeModal.addEventListener('click', () => modal.style.display = 'none');

    soundOpts.forEach(opt => {
      opt.addEventListener('click', function() {
        soundOpts.forEach(s => s.classList.remove('active'));
        this.classList.add('active');
        currentProfile = this.dataset.type;
        
        // Immediate swap of wave types based on profile
        if (currentProfile === 'sawtooth') {
          osc1.type = 'sawtooth';
          osc2.type = 'sine'; // Support layer
        } else if (currentProfile === 'tesla') {
          osc1.type = 'triangle'; // Low thrum
          osc2.type = 'sine';     // High whistle
        }
      });
    });

    function setSpeed(mph) {
      speedEl.textContent = Math.round(mph);
      if (audioEnabled && audioCtx) {
        
        if (currentProfile === 'sawtooth') {
          osc1.frequency.setTargetAtTime(60 + (mph * 5), audioCtx.currentTime, 0.1);
          osc2.frequency.setTargetAtTime(120 + (mph * 5), audioCtx.currentTime, 0.1);
          filter.frequency.setTargetAtTime(400 + (mph * 40), audioCtx.currentTime, 0.1);
        } 
        else if (currentProfile === 'tesla') {
          // Deep thrum stays lower
          osc1.frequency.setTargetAtTime(50 + (mph * 2), audioCtx.currentTime, 0.1);
          // Whine climbs much higher
          osc2.frequency.setTargetAtTime(150 + (mph * 12), audioCtx.currentTime, 0.1);
          // Keep filter mostly open for that clean electric sound
          filter.frequency.setTargetAtTime(2000 + (mph * 50), audioCtx.currentTime, 0.1);
        }

        const vol = mph > 0 ? Math.min(0.4, 0.05 + (mph / 80)) : 0;
        gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
      }

      if (mph < 20) speedEl.style.color = '#00ffcc';
      else if (mph < 40) speedEl.style.color = '#ffaa00';
      else speedEl.style.color = '#ff4400';
    }

    function startGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
          if (!debugCheck.checked) setSpeed((pos.coords.speed || 0) * 2.237);
        }, null, { enableHighAccuracy: true });
      }
    }

    debugCheck.addEventListener('change', function() {
      debugPanel.style.display = this.checked ? 'flex' : 'none';
      if (!this.checked) startGPS();
    });

    manualSlider.addEventListener('input', function() {
      setSpeed(parseInt(this.value));
    });

    startGPS();
  </script>
</body>
</html>
