<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#030405">

  <title>E-Moto AVAS System V2</title>
  <style>
    :root {
      --bg-color: #030405;
      --accent-cyan: #00f2ff;
      --accent-green: #00ff88;
      --accent-orange: #ff9d00;
      --accent-violet: #bc13fe;
      --text-main: #e0e0e0;
      --text-muted: #33393f;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
    }

    #canvas-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    header {
      width: 100%; padding: 30px 24px 10px 24px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 20;
    }
    
    .app-title { font-size: 11px; font-weight: 900; letter-spacing: 4px; color: var(--text-muted); }
    
    .status-indicator { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--text-muted); }
    #gps-text.linked { color: var(--accent-green); }
    
    .status-dot { width: 8px; height: 8px; background-color: #300; border-radius: 50%; }
    .status-dot.active { 
      background-color: var(--accent-green); 
      box-shadow: 0 0 12px var(--accent-green);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .telemetry-bar {
      width: 100%; padding: 0 24px 20px 24px; display: flex; justify-content: space-between;
      font-size: 10px; font-family: monospace; color: var(--text-muted);
      z-index: 20;
    }
    
    main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; z-index: 10; }
    
    #speed { 
      font-family: 'Courier New', monospace; font-size: clamp(120px, 40vh, 280px); font-weight: 900; 
      line-height: 0.8; color: var(--accent-cyan); 
      text-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
    }
    #unit { font-size: 14px; font-weight: 900; letter-spacing: 15px; color: var(--text-muted); margin-top: 15px; }

    .controls-bar { width: 100%; padding: 20px 24px 50px 24px; display: flex; justify-content: center; z-index: 20; }
    button { 
      width: 100%; max-width: 340px; padding: 20px; 
      background: rgba(20, 22, 25, 0.8); backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main); 
      font-size: 13px; font-weight: 900; letter-spacing: 4px; border-radius: 12px; 
      text-transform: uppercase;
    }
    button.active-toggle { border-color: var(--accent-green); color: var(--accent-green); }
    
    #secret-trigger { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 100; }
  </style>
</head>
<body>
  <div id="secret-trigger"></div>
  <div id="canvas-container"><canvas id="visualizer"></canvas></div>
  
  <header>
    <div class="app-title">AVAS CORE V2</div>
    <div class="status-indicator">
        <div class="status-dot" id="gps-dot"></div>
        <span id="gps-text">GPS SEARCHING</span>
    </div>
  </header>
  
  <div class="telemetry-bar">
    <span id="acc-val">SIGNAL: --</span>
    <span id="sim-status">SIM: OFF</span>
  </div>
  
  <main id="interaction-zone">
    <div id="speed">0</div>
    <div id="unit">MPH</div>
  </main>
  
  <div class="controls-bar"><button id="audio-btn">Standby</button></div>

  <script>
    const speedEl = document.getElementById('speed');
    const audioBtn = document.getElementById('audio-btn');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    let audioCtx, analyser, dataArray;
    let audioEnabled = false;
    let currentSpeed = 0;

    function resize() {
      canvas.width = window.innerWidth * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvasCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resize);
    resize();

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      
      // Basic Oscillator to feed the visualizer
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(analyser);
      analyser.connect(audioCtx.destination);
      osc.start();
      gain.gain.value = 0.01; // Keep it quiet but present
      
      draw();
    }

    function draw() {
      requestAnimationFrame(draw);
      const w = window.innerWidth;
      const h = window.innerHeight;
      canvasCtx.clearRect(0, 0, w, h);

      if (!audioEnabled) return;

      analyser.getByteTimeDomainData(dataArray);
      
      canvasCtx.lineWidth = 3 + (currentSpeed / 20);
      canvasCtx.strokeStyle = '#bc13fe';
      canvasCtx.shadowBlur = 15;
      canvasCtx.shadowColor = '#bc13fe';
      
      canvasCtx.beginPath();
      let sliceWidth = w / dataArray.length;
      let x = 0;

      for (let i = 0; i < dataArray.length; i++) {
        let v = dataArray[i] / 128.0;
        let y = v * h / 2;
        if (i === 0) canvasCtx.moveTo(x, y);
        else canvasCtx.lineTo(x, y);
        x += sliceWidth;
      }
      canvasCtx.stroke();
    }

    audioBtn.addEventListener('click', async () => {
      if (!audioCtx) initAudio();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      
      audioEnabled = !audioEnabled;
      audioBtn.textContent = audioEnabled ? "System Active" : "Standby";
      audioBtn.classList.toggle('active-toggle', audioEnabled);
    });

    // Simple simulation for testing
    document.getElementById('interaction-zone').addEventListener('mousemove', (e) => {
        currentSpeed = Math.floor((e.clientX / window.innerWidth) * 100);
        speedEl.textContent = currentSpeed;
    });
  </script>
</body>
</html>
